# SonarQube Configuration for Librairie ABC
# Compatible with SonarCloud (cloud.sonarqube.com)
# Usage: sonar-scanner -Dproject.settings=sonar-project.properties

# Identifiant du projet
sonar.projectKey=librairie-abc
sonar.projectName=Librairie ABC - Modernisation et Sécurisation
sonar.projectVersion=1.0.0

# Source et binaires
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Langage Python
sonar.language=py

# Exclusions
sonar.exclusions=**/__pycache__/**,**/test_*.py,**/*.pyc,**/migrations/**

# Tests
sonar.test.inclusions=tests/**
sonar.coverage.exclusions=tests/**

# Qualité de code
sonar.qualitygate.wait=false

# Règles de sécurité
sonar.security.hotspots=true

# Configuration Python
sonar.python.version=3.8

# Coverage (si utilisé avec coverage.py)
# sonar.python.coverage.reportPaths=coverage.xml

# Règles de sécurité spécifiques
sonar.rules.python.exclude=pythonlegacy

# Complexité (fonction trop complexe)
sonar.python.pylint.reportPath=reports/pylint-report.txt

# Détails de gestion
sonar.links.homepage=https://github.com/votre-repo/librairie-abc
sonar.links.ci=https://github.com/votre-repo/librairie-abc/actions
sonar.links.issue=https://github.com/votre-repo/librairie-abc/issues
sonar.links.scm=https://github.com/votre-repo/librairie-abc

# Dossier de cache
sonar.working.directory=.sonar
